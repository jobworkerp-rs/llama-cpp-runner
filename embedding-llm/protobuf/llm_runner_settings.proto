syntax = "proto3";

package embedding_llm;

enum ModelType {
  GGUF = 0;         // llama.cppメイン対応（デフォルト）
}

enum DType {
  F32 = 0;  // 32-bit float (default for CPU)
  F16 = 1;  // 16-bit float (default for GPU)
  BF16 = 2; // 16-bit brain float (may have issues with CUDA)
}

message EmbeddingLlmRunnerSettings {
  // HuggingFace model ID or local model path
  string model_id = 1;
  
  // Use CPU instead of GPU for inference
  bool use_cpu = 2;
  
  // Model precision (default: F16 for GPU, F32 for CPU)
  // Note: BF16 may have issues with CUDA acceleration in some environments
  // ref. https://github.com/ggml-org/llama.cpp/issues/9881#issuecomment-2414516092
  optional DType dtype = 3;
  
  // Maximum sequence length for tokenization
  uint32 max_seq_length = 4;
  
  // Model format type
  ModelType model_type = 5;
  
  // Model files (required when model_type = GGUF)
  // For GGUF models, specify the .gguf files to load
  repeated string model_files = 6;
  
  // Optional: separate tokenizer model ID (if different from model_id)
  // If specified, this tokenizer will be used instead of GGUF built-in tokenizer
  optional string tokenizer_model_id = 7;
  
  // Optional: sliding window configuration
  optional SlidingWindowConfig sliding_window_config = 8;
  
  // Maximum batch size for batch processing (default: adaptive based on memory)
  // Used for sliding window segments batch processing optimization
  optional uint32 max_batch_size = 9;
}

message SlidingWindowConfig {
  // Window stride for sliding window processing
  uint32 window_stride = 1;
  
  // Minimum window size
  uint32 min_window_size = 2;
}