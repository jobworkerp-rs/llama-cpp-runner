input:
  schema: # for schema validation only
    document:
      type: object
      description: ollama input
      properties:
        prompt:
          type: string
          description: "The initial prompt."
        user_id:
          type: integer
          description: "The user ID of the user who generated the sample."
        options:
          type: object
          description: "The options used to generate the sample. (optional)"
          properties:
            sample_len:
              type: integer
              description: "The length of the sample to generate (in tokens) (default: context size)."
            temperature:
              description: "The temperature used to generate samples."
              type: number
            top_p:
              description: "Nucleus sampling probability cutoff."
              type: number
            repeat_penalty:
              description: "Penalty to be applied for repeating tokens, 1. means no penalty."
              type: number
            repeat_last_n:
              description: "The context size to consider for the repeat penalty."
              type: integer
            seed:
              description: "The seed to use when generating random samples."
              type: integer
        override_system_prompt:
          type: string
          description: "The system prompt to use for this sample. (optional)"
        use_chat:
          type: boolean
          description: "Whether to use the chat api for this sample. (optional)"
        reflesh_history:
          type: boolean
          description: "Whether to reflesh the chat history for this sample. (optional)"
        histories:
          type: array
          description: "The history of the conversation leading up to this sample. (optional)"
          items:
            type: object
            properties:
              chat_id:
                type: integer
                description: "The chat ID."
              role:
                type: string
                description: "The role of the user in the chat.(user or system or assistant)"
              content:
                type: string
                description: "The message that was sent."
      required: [prompt]
output: # for annotation only
  schema:
    document:
      type: object
      description: ollama output
      properties:
        prompt:
          type: string
          description: "The initial prompt."
        user_id:
          type: integer
          description: "The user ID of the user who generated the sample."
        options:
          type: object
