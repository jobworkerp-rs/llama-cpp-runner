[package]
name = "jobworkerp-llama-cpp-plugin"
version = "0.1.0"
edition = "2021"

#[[bin]]
#name = "sample"

[lib]
crate-type = ["dylib"]
#crate-type = ["cdylib"]


[dependencies]
command-utils = { git = "https://github.com/sutr-app/command-utils", branch = "main" }

anyhow = "1"
async-trait = { version = "0.1" }
base64 = { version = "0.22" }
bindgen = "0.70"
cc = "1.1"
clap = { version = "4.5", features = ["derive"] }
criterion = "0.5"
dotenvy = { version = "0.15" }
encoding_rs = "0.8"
envy = { version = "0.4" }
hf-hub = { version = "0.3" }
#llama-cpp-2 = { git = "https://github.com/utilityai/llama-cpp-rs", rev = "08d74951afab1fcb84b254478d512d492ca58cd7", features = [
#    "cuda",
#] }
#llama-cpp-sys-2 = { git = "https://github.com/utilityai/llama-cpp-rs", rev = "08d74951afab1fcb84b254478d512d492ca58cd7", features = [
#    "cuda",
#] }
llama-cpp-2 = { version = "0.1.82", features = ["cuda"]}
log = { version = "0.4" }
once_cell = { version = "1" }
#pprof = "0.13.0"
prost = { version = "0.13" }
rand = { version = "0.8" }
safetensors = { version = "0.4" }
scopeguard = { version = "1" }
serde = { version = "1" }
serde_json = { version = "1" }
thiserror = { version = "1" }
tokenizers = { version = "0.20" }
tokio = { version = "1" }
tracing = { version = "0.1" }
tracing-subscriber = { version = "0.3" }
url = { version = "2" }

[build-dependencies]
prost-build = { version = "0.13" }

[workspace.lints.rust]
missing_docs = { level = "warn" }
missing_debug_implementations = { level = "warn" }

[workspace.lints.clippy]
pedantic = { level = "warn" }

[profile.release]
# Tell `rustc` to optimize for small code size.
opt-level = "s"
panic = "unwind"

[profile.dev]
panic = "unwind"
