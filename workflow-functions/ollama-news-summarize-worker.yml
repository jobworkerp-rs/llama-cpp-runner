input:
  schema: # for schema validation only
    document:
      type: object
      description: ollama input
      properties:
        prompt:
          type: string
          description: "The initial prompt."
        sample_len:
          description: "The length of the sample to generate (in tokens) (default: context size)."
          type: integer
        temperature:
          description: "The temperature used to generate samples."
          type: number
        top_p:
          description: "Nucleus sampling probability cutoff."
          type: number
        repeat_penalty:
          description: "Penalty to be applied for repeating tokens, 1. means no penalty."
          type: number
        repeat_last_n:
          description: "The context size to consider for the repeat penalty."
          type: integer
        seed:
          description: "The seed to use when generating random samples."
          type: integer
      required: [prompt]
output: # for annotation only
  schema:
    document:
      type: object
      description: ollama output
      properties:
        prompt:
          type: string
          description: "The initial prompt."
        sample_len:
          type: integer
          description: "The length of the sample to generate (in tokens) (default: context size)."
        temperature:
          description: "The temperature used to generate samples."
          type: number
        top_p:
          description: "Nucleus sampling probability cutoff."
          type: number
        repeat_penalty:
          description: "Penalty to be applied for repeating tokens, 1. means no penalty."
          type: number
        repeat_last_n:
          description: "The context size to consider for the repeat penalty."
          type: integer
        seed:
          description: "The seed to use when generating random samples."
          type: integer
run:
  script:
    language: jobworkerp
    code: OllamaPromptRunner
    arguments: # for annotation only
      prompt: |
        ${$input}
        要約：
metadata: # todo init parameters
  runnerSettings:
    baseUrl: http://ollma.ollama.svc.cluster.local:11434
    #model: hf.co/Local-Novel-LLM-project/Shadows-MoE-GGUF
    model: hf.co/elyza/Llama-3-ELYZA-JP-8B-GGUF #karakuri-lm-8x7b-instruct-v0.1-Q3_K_M
    systemPrompt: |
      以下は直近のニュースのタイトルと本文と掲載リンク先を並べたものです。500文字以内程度で簡単に目を通すためのタイトルと内容の要約を日本語でマークダウン形式で作成してください。要約部分には要約文のみを出力してください：
  worker:
    name: OllamaWorker
