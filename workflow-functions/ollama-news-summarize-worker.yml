input: # for annotation only
  schema:
    document:
      type: string
      description: ollama input
#      properties:
#        prompt:
#          type: string
#          description: The prompt.(required)
#        sampleLen:
#          type: integer
#          description: max length of the output sample.(optional)
output: # for annotation only
  schema:
    document:
      type: string
      description: ollama output
run:
  script:
    language: jobworkerp
    code: OllamaRunner
    arguments: # for annotation only
      prompt: ${input.prompt}
metadata: # todo init parameters
  initArg:
    baseUrl: http://ollma.ollama.svc.cluster.local:11434
    model: hf.co/Local-Novel-LLM-project/Shadows-MoE-GGUF
    # hf.co/elyza/Llama-3-ELYZA-JP-8B-GGUF #karakuri-lm-8x7b-instruct-v0.1-Q3_K_M
    systemPrompt: |
      以下は直近のニュースのタイトルと本文と掲載リンク先を並べたものです。500文字以内程度で簡単に目を通すためのタイトルと内容の要約を日本語でマークダウン形式で作成してください。要約部分には要約文のみを出力してください：
      ${input.prompt}
      要約：
  worker:
    name: OllamaWorker
    channel: gpu
