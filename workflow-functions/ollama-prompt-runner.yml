input:
  schema:
    document:
      type: object
      description: ollama input
      properties:
        prompt:
          type: string
          description: "The initial prompt."
        sample_len:
          description: "The length of the sample to generate (in tokens) (default: context size)."
          type: integer
        temperature:
          description: "The temperature used to generate samples."
          type: number
        top_p:
          description: "Nucleus sampling probability cutoff."
          type: number
        repeat_penalty:
          description: "Penalty to be applied for repeating tokens, 1. means no penalty."
          type: number
        repeat_last_n:
          description: "The context size to consider for the repeat penalty."
          type: integer
        seed:
          description: "The seed to use when generating random samples."
          type: integer
      required: [prompt]
output:
  schema:
    document:
      type: object
      description: ollama output (same as input, prompt overwritten)
      properties:
        prompt:
          type: string
          description: "The initial prompt."
        sample_len:
          type: integer
          description: "The length of the sample to generate (in tokens) (default: context size)."
        temperature:
          description: "The temperature used to generate samples."
          type: number
        top_p:
          description: "Nucleus sampling probability cutoff."
          type: number
        repeat_penalty:
          description: "Penalty to be applied for repeating tokens, 1. means no penalty."
          type: number
        repeat_last_n:
          description: "The context size to consider for the repeat penalty."
          type: integer
        seed:
          description: "The seed to use when generating random samples."
          type: integer
run:
  function:
    runnerName: OllamaPromptRunner
    arguments:
      prompt: |
        ${.}
    settings:
      baseUrl: http://ollma.ollama.svc.cluster.local:11434
      model: phi4
      systemPrompt: |
          You are a helpful assistant.

