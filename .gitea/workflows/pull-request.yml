name: Pull Request CI

on:
  pull_request:
    branches: [ main ]

env:
  NVIDIA_VISIBLE_DEVICES: all
  NVIDIA_DISABLE_REQUIRE: true
  NVIDIA_DRIVER_CAPABILITIES: compute,utility
  RUSTFLAGS: "-C relocation-model=pic"
  CFLAGS: "-fPIC"
  CXXFLAGS: "-fPIC"
  NVCCFLAGS: "--compiler-options -fPIC"
  CUDA_NVCC_FLAGS: "--compiler-options -fPIC"
  CMAKE_POSITION_INDEPENDENT_CODE: "ON"
  CMAKE_C_FLAGS: "-fPIC"
  CMAKE_CXX_FLAGS: "-fPIC"

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: gitea.sutr.app/servers/rust-gpu-build:main
      options: --gpus all
      env:
        NVIDIA_VISIBLE_DEVICES: all
        NVIDIA_DISABLE_REQUIRE: true
        RUSTFLAGS: "-C relocation-model=pic"
        CFLAGS: "-fPIC"
        CXXFLAGS: "-fPIC"
        NVCCFLAGS: "--compiler-options -fPIC"
        CUDA_NVCC_FLAGS: "--compiler-options -fPIC"
        CMAKE_POSITION_INDEPENDENT_CODE: "ON"
        CMAKE_C_FLAGS: "-fPIC"
        CMAKE_CXX_FLAGS: "-fPIC"

    steps:
    - name: Install Node.js for GitHub Actions
      run: |
        curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
        apt-get install -y nodejs
        node --version
        npm --version

    - name: Setup SSH key for submodules
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        chmod 700 ~/.ssh
        ssh-keyscan -H gitea.sutr.app >> ~/.ssh/known_hosts
        chmod 644 ~/.ssh/known_hosts
        # Debug: check key format
        head -1 ~/.ssh/id_ed25519
        tail -1 ~/.ssh/id_ed25519
      env:
        SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Display GPU information
      run: |
        /usr/bin/nvidia-smi
        echo $PATH

    - name: Clean previous builds
      run: cargo clean

    - name: Build project
      run: cargo build --release

    - name: Run tests
      run: cargo test --release -- --test-threads=1

    # Multimodal happy-path tests are marked #[ignore] because they pull
    # real HF models. We still gate them on PR CI so breakage in the
    # image/audio path cannot land on main unnoticed. Keep this aligned
    # with the smoke step in main-merge.yml.
    - name: Run multimodal smoke tests (ignored)
      run: |
        cargo test -p jobworkerp-llama-cpp-plugin \
          test_multimodal_generation_with_real_model \
          --release -- --ignored --test-threads=1 --nocapture
        cargo test -p jobworkerp-llama-cpp-plugin \
          test_multimodal_audio_generation \
          --release -- --ignored --test-threads=1 --nocapture
        cargo test -p embedding-llm \
          integration_test_multimodal_embedding \
          --release -- --ignored --test-threads=1 --nocapture
