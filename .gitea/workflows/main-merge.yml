name: Main Branch CI/CD

on:
  push:
    branches: [ main ]

env:
  NVIDIA_VISIBLE_DEVICES: all
  NVIDIA_DISABLE_REQUIRE: true
  NVIDIA_DRIVER_CAPABILITIES: compute,utility
  RUSTFLAGS: "-C relocation-model=pic"
  CFLAGS: "-fPIC"
  CXXFLAGS: "-fPIC"
  NVCCFLAGS: "--compiler-options -fPIC"
  CUDA_NVCC_FLAGS: "--compiler-options -fPIC"
  CMAKE_POSITION_INDEPENDENT_CODE: "ON"
  CMAKE_C_FLAGS: "-fPIC"
  CMAKE_CXX_FLAGS: "-fPIC"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    outputs:
      release-tag: ${{ steps.tag.outputs.tag }}
    container:
      image: gitea.sutr.app/servers/rust-gpu-build:20250926
      options: --gpus all
      env:
        CARGO_HOME: /usr/local/cargo
        NVIDIA_DISABLE_REQUIRE: true
        NVIDIA_VISIBLE_DEVICES: all
        NVIDIA_DRIVER_CAPABILITIES: compute,utility
        RUSTFLAGS: "-C relocation-model=pic"
        CFLAGS: "-fPIC"
        CXXFLAGS: "-fPIC"
        NVCCFLAGS: "--compiler-options -fPIC"
        CUDA_NVCC_FLAGS: "--compiler-options -fPIC"
        CMAKE_POSITION_INDEPENDENT_CODE: "ON"
        CMAKE_C_FLAGS: "-fPIC"
        CMAKE_CXX_FLAGS: "-fPIC"

    steps:
    - name: Install Node.js for GitHub Actions
      run: |
        curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
        apt-get install -y nodejs
        node --version
        npm --version

    - name: Setup SSH key for submodules
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        chmod 700 ~/.ssh
        ssh-keyscan -H gitea.sutr.app >> ~/.ssh/known_hosts
        chmod 644 ~/.ssh/known_hosts

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-release-
          ${{ runner.os }}-cargo-

    - name: Clean previous builds
      run: cargo clean

    - name: Build release without CUDA (test)
      run: cargo build --release
      continue-on-error: true
      
    - name: Build release with CUDA
      run: cargo build --release --features cuda

    - name: Generate release tag
      id: tag
      run: |
        TAG_VERSION=$(date '+%Y%m%d_%H%M%S')
        echo "tag=${TAG_VERSION}" >> $GITHUB_OUTPUT
        echo "Generated tag: ${TAG_VERSION}"

    - name: Create and push git tag
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git tag ${{ steps.tag.outputs.tag }}
        git push origin --tags
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Install Git LFS
      run: |
        curl -s https://packagecloud.io/install/repositories/github/git-lfs/script.deb.sh | bash
        apt-get install -y git-lfs

    - name: Publish plugin
      run: |
        git config --global http.postBuffer 157286400
        git config --global http.version HTTP/1.1
        git clone --depth 1 ssh://git@gitea.sutr.app/jobworkerp-rs/jobworkerp-plugins.git
        cd jobworkerp-plugins
        git lfs install
        git lfs pull
        git checkout origin/main -- ./VERSION
        git reset --soft origin/main
        mkdir -p cuda_runner
        cp ../target/release/lib*.so cuda_runner/
        git add .
        if [ $(git diff --staged | wc -l) -eq 0 ]; then
          echo "No changes to publish"
          exit 0
        fi
        echo ${{ steps.tag.outputs.tag }} > VERSION
        git add ./VERSION
        git commit -m "Publish plugin ${{ steps.tag.outputs.tag }}"
        git push origin main
        git tag ${{ steps.tag.outputs.tag }}
        git push origin --tags
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

