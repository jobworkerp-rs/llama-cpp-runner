syntax = "proto3";

package llama_cpp;

import "llama_cpp/media_input.proto";

// GGML data type used for the KV cache (maps to llama-cpp-2 `KvCacheType`).
// Quantizing the KV cache (e.g. Q8_0) shrinks its memory footprint, which
// matters for very long contexts. UNSPECIFIED keeps the llama.cpp default
// (F16). Note: V-cache quantization typically requires flash attention.
enum KvCacheType {
    KV_CACHE_TYPE_UNSPECIFIED = 0;
    KV_CACHE_TYPE_F32 = 1;
    KV_CACHE_TYPE_F16 = 2;
    KV_CACHE_TYPE_Q4_0 = 3;
    KV_CACHE_TYPE_Q4_1 = 4;
    KV_CACHE_TYPE_Q5_0 = 5;
    KV_CACHE_TYPE_Q5_1 = 6;
    KV_CACHE_TYPE_Q8_0 = 7;
    KV_CACHE_TYPE_Q8_1 = 8;
    KV_CACHE_TYPE_Q2_K = 9;
    KV_CACHE_TYPE_Q3_K = 10;
    KV_CACHE_TYPE_Q4_K = 11;
    KV_CACHE_TYPE_Q5_K = 12;
    KV_CACHE_TYPE_Q6_K = 13;
    KV_CACHE_TYPE_Q8_K = 14;
    KV_CACHE_TYPE_IQ2_XXS = 15;
    KV_CACHE_TYPE_IQ2_XS = 16;
    KV_CACHE_TYPE_IQ3_XXS = 17;
    KV_CACHE_TYPE_IQ1_S = 18;
    KV_CACHE_TYPE_IQ4_NL = 19;
    KV_CACHE_TYPE_IQ3_S = 20;
    KV_CACHE_TYPE_IQ2_S = 21;
    KV_CACHE_TYPE_IQ4_XS = 22;
    KV_CACHE_TYPE_I8 = 23;
    KV_CACHE_TYPE_I16 = 24;
    KV_CACHE_TYPE_I32 = 25;
    KV_CACHE_TYPE_I64 = 26;
    KV_CACHE_TYPE_F64 = 27;
    KV_CACHE_TYPE_IQ1_M = 28;
    KV_CACHE_TYPE_BF16 = 29;
    KV_CACHE_TYPE_TQ1_0 = 30;
    KV_CACHE_TYPE_TQ2_0 = 31;
    KV_CACHE_TYPE_MXFP4 = 32;
}

message LlamaRunnerSettings {
    // The path or name to the model
    // if hf_repo is Some, the model is filename on huggingface
    // if hf_remo is None, the model is a local path
    // (multiple files can be specified with a comma)
    string model = 1;
    // Download a model from huggingface (or use a cached version)
    // the repo containing the model. e.g. `TheBloke/Llama-2-7B-Chat-GGUF`
    optional string hf_repo = 2;
    // Disable offloading layers to the gpu
    bool disable_gpu = 3;
    // RNG seed (default: 1234)
    optional uint32 seed = 4;
    // number of threads to use during generation (default: use all available threads)
    optional uint32 threads = 5;
    // number of threads to use during batch and prompt processing (default: use all available threads)
    optional uint32 threads_batch = 6;
    // size of the prompt context (default: 0 (from model))
    optional uint32 ctx_size = 7;
    // use flash attention (default true)
    optional bool use_flash_attention = 8;
    // system prompt before the user prompt
    optional string system_prompt = 9;

    // Multimodal projector settings. When omitted, the runner operates in
    // text-only mode (default; no behavior change from prior releases).
    optional MtmdSettings mtmd = 10;

    // Logical max batch size for prompt processing. Affects prompt evaluation
    // (time-to-first-token), not per-token generation speed. When omitted, the
    // llama.cpp default (2048) is used.
    optional uint32 n_batch = 11;
    // Physical max micro-batch size. When omitted, the llama.cpp default (512)
    // is used. Lower than n_batch reduces peak memory during prompt eval.
    optional uint32 n_ubatch = 12;

    // KV cache data type for K. When omitted (UNSPECIFIED), the llama.cpp
    // default (F16) is used. Quantizing (e.g. Q8_0) reduces KV cache memory
    // for long contexts.
    optional KvCacheType type_k = 13;
    // KV cache data type for V. When omitted (UNSPECIFIED), the llama.cpp
    // default (F16) is used. Quantizing V typically requires flash attention.
    optional KvCacheType type_v = 14;

    // Reuse the KV cache across requests by keeping the longest common token
    // prefix and prefilling only the differing suffix (text-only). Skips
    // re-evaluating a shared system prompt / document on every request, cutting
    // time-to-first-token for long-context workloads. When false (default), the
    // KV cache is cleared before each request, so requests stay fully
    // independent and deterministic.
    optional bool reuse_kv_prefix = 15;

    // Same-model MTP speculative decoding settings. MTP is fixed when the
    // runner creates its llama.cpp context, so it is configured at runner load
    // time rather than per request. When omitted or enabled=false, generation
    // uses the existing non-speculative path.
    optional MtpSpeculativeSettings mtp = 16;

    // TODO
    // override some parameters of the model
    //key_value_overrides: Option<Vec<(String, ParamOverrideValueWrapper)>>,
}

message MtpSpeculativeSettings {
    bool enabled = 1;
    optional uint32 n_max = 2;
    optional uint32 n_min = 3;
    optional float p_min = 4;
    optional KvCacheType draft_type_k = 5;
    optional KvCacheType draft_type_v = 6;
    optional string draft_model = 7;
    optional string draft_hf_repo = 8;
}
